<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S&L Verpackungen</title>
  <meta name="description" content="Moderne Verpackungslösungen für Unternehmen – Kartonagen, Verpackungsfolie und Klebebänder.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#f5f7fb;
      --white:#ffffff;
      --text:#111827;
      --text-soft:#5b6472;
      --line:#e6ebf2;
      --accent:#2563eb;
      --accent-dark:#1d4ed8;
      --accent-soft:#dbeafe;
      --teal:#0f766e;
      --shadow:0 12px 40px rgba(15, 23, 42, 0.08);
      --shadow-hover:0 22px 54px rgba(15, 23, 42, 0.14);
      --radius-xl:28px;
    }

    *{box-sizing:border-box;}
    body{
      margin:0;
      font-family:'Inter',sans-serif;
      background:linear-gradient(180deg, #f8fbff 0%, #f5f7fb 100%);
      color:var(--text);
    }

    .container{
      width:min(1180px, calc(100% - 40px));
      margin:0 auto;
    }

    /* NAV */
    .nav{
      position:sticky;
      top:0;
      background:rgba(255,255,255,0.8);
      backdrop-filter:blur(12px);
      border-bottom:1px solid var(--line);
      z-index:1000;
    }

    .nav-inner{
      display:flex;
      justify-content:space-between;
      align-items:center;
      min-height:80px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      font-weight:800;
    }

    .brand-dot{
      width:10px;
      height:10px;
      border-radius:50%;
      background:linear-gradient(135deg, var(--accent), var(--teal));
    }

    .nav-links{
      display:flex;
      gap:20px;
      align-items:center;
    }

    .nav-cta{
      background:linear-gradient(135deg, var(--accent), var(--accent-dark));
      color:#fff;
      padding:10px 16px;
      border-radius:999px;
      font-weight:700;
    }

    /* HERO */
    .hero-wrap{
      padding:60px 0;
      text-align:center;
    }

    .hero-logo-box{
      position:relative;
      max-width:560px;
      margin:0 auto 20px;
      padding:14px;
      border-radius:var(--radius-xl);
      background:linear-gradient(180deg, rgba(255,255,255,0.96), rgba(255,255,255,0.88));
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      transition:0.25s ease;
      overflow:hidden;
    }

    .hero-logo-box:hover{
      transform:translateY(-6px);
      box-shadow:var(--shadow-hover);
    }

    .hero-logo-box::before{
      content:"";
      position:absolute;
      top:0;
      left:0;
      right:0;
      height:4px;
      background:linear-gradient(90deg, var(--accent), var(--teal));
    }

    .hero-logo-box img{
      width:100%;
      border-radius:18px;
    }

    h1{
      font-size:clamp(2rem,5vw,4rem);
      margin:10px 0;
    }

    .btn{
      padding:14px 22px;
      border-radius:999px;
      font-weight:700;
      display:inline-block;
      margin:10px;
    }

    .btn-dark{
      background:var(--accent);
      color:#fff;
    }

    .btn-light{
      background:#fff;
      border:1px solid var(--line);
    }

    /* PRODUCTS */
    .product-section{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:24px;
      margin-top:40px;
    }

    .product-card{
      background:#fff;
      border-radius:var(--radius-xl);
      padding:20px;
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      transition:0.2s;
    }

    .product-card:hover{
      transform:translateY(-6px);
      box-shadow:var(--shadow-hover);
    }

    .product-card::before{
      content:"";
      display:block;
      height:4px;
      border-radius:10px 10px 0 0;
      background:linear-gradient(90deg, var(--accent), var(--teal));
      margin:-20px -20px 15px;
    }

    .product-card img{
      border-radius:16px;
      height:200px;
      object-fit:cover;
      margin-bottom:10px;
    }

    /* RESPONSIVE */
    @media(max-width:900px){
      .product-section{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>

<body>

<nav class="nav">
  <div class="container nav-inner">
    <div class="brand">
      <span class="brand-dot"></span>
      S&L Verpackungen
    </div>

    <div class="nav-links">
      <a href="#produkte">Produkte</a>
      <a href="#kontakt">Kontakt</a>
      <a href="#kontakt" class="nav-cta">Anfrage</a>
    </div>
  </div>
</nav>

<div class="hero-wrap">
  <div class="container">

    <div class="hero-logo-box">
      <img src="images/WhatsApp Image 2026-03-10 at 13.34.05.jpeg">
    </div>

    <h1>Moderne Verpackungslösungen</h1>

    <div>
      <a class="btn btn-dark">Produkte</a>
      <a class="btn btn-light">Kontakt</a>
    </div>

  </div>
</div>

<section id="produkte" class="container">

  <div class="product-section">

    <div class="product-card">
      <img src="images/kartonagen.png">
      <h3>Kartonagen</h3>
      <p>Stabile Versandkartons und individuelle Lösungen.</p>
    </div>

    <div class="product-card">
      <img src="images/folien.png">
      <h3>Verpackungsfolie</h3>
      <p>Schutz für Transport und Lager.</p>
    </div>

    <div class="product-card">
      <img src="images/klebeband.png">
      <h3>Klebebänder</h3>
      <p>Sicherer Verschluss für alle Anwendungen.</p>
    </div>

  </div>

</section>

</body>
</html>
